<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

    <h1>Iniciar Sesión</h1>

    <form action="/login" method="POST">

        <input
            type="text"
            name="correo"
            placeholder="Correo">

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Contraseña">

        <br><br>

        <button type="submit">
            Iniciar sesión
        </button>

    </form>

</body>
</html>
